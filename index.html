<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Publicitario Bitcoin</title>
    <style>
        /* Estilos Generales */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Espacio entre elementos */
        }

        /* Estilo para los bloques de anuncios */
        .ad-slot {
            background-color: #bc00ff; /* Púrpura de la imagen */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
        }

        /* Tamaños específicos de los anuncios */
        .ad-728x90  { width: 728px; height: 90px; }
        .ad-320x100 { width: 320px; height: 100px; }
        .ad-468x60  { width: 468px; height: 60px; }
        .ad-300x250 { width: 300px; height: 250px; }

        /* Estilo del Contenedor de Texto */
        .content-text {
            max-width: 600px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 22px;
            line-height: 1.4;
            padding: 10px;
        }

        /* Estilo de la Imagen */
        .main-image {
            max-width: 100%;
            height: auto;
            border: 1px solid #333;
        }

        /* Adaptabilidad para móviles */
        @media (max-width: 768px) {
            .ad-slot {
                max-width: 100%;
            }
            .content-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="ad-slot ad-728x90">728x90</div>

    <div class="ad-slot ad-320x100">320x100</div>

    <div class="ad-slot ad-468x60">468x60</div>

    <div class="content-text">
        PARECE UN MEME PERO ES REALIDAD: "Bitcoin se dispara hacia los 300.000 dólares: la gran subida que viene."
    </div>

    <img src="https://qu.ax/d4ddy.jpg" alt="Gráfico Bitcoin" class="main-image">

    <div class="ad-slot ad-300x250">300x250</div>

    <div class="ad-slot ad-320x100">320x100</div>

</body>
</html>
